services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perfecto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perfecto}
      POSTGRES_DB: ${POSTGRES_DB:-perfecto}
    ports:
      # Host port 5544 avoids clashing with a native Postgres on 5432.
      # Container/internal port stays 5432 (used by the app over the compose network).
      - "${POSTGRES_HOST_PORT:-5544}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perfecto} -d ${POSTGRES_DB:-perfecto}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-perfecto}:${POSTGRES_PASSWORD:-perfecto}@db:5432/${POSTGRES_DB:-perfecto}?schema=public

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_AUTH_DEV_MODE: ${NEXT_PUBLIC_AUTH_DEV_MODE:-false}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Inside the compose network the database host is "db", not "localhost".
      DATABASE_URL: postgresql://${POSTGRES_USER:-perfecto}:${POSTGRES_PASSWORD:-perfecto}@db:5432/${POSTGRES_DB:-perfecto}?schema=public
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      # Omit blank AWS keys from .env when using EC2 IAM role — empty values block the role chain.
    ports:
      # Host port 3000 for production (EC2 security group). Use APP_HOST_PORT=3002 locally if 3000 is taken.
      - "${APP_HOST_PORT:-3000}:3000"

volumes:
  postgres-data:
