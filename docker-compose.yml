services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perfecto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perfecto}
      POSTGRES_DB: ${POSTGRES_DB:-perfecto}
    ports:
      # Host port 5544 avoids clashing with a native Postgres on 5432.
      # Container/internal port stays 5432 (used by the app over the compose network).
      - "${POSTGRES_HOST_PORT:-5544}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perfecto} -d ${POSTGRES_DB:-perfecto}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Localhost-only publish for `npm run dev` / redis-cli. Not exposed on the
    # public interface (bind 127.0.0.1). App containers use redis://redis:6379.
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-perfecto}:${POSTGRES_PASSWORD:-perfecto}@db:5432/${POSTGRES_DB:-perfecto}?schema=public

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_AUTH_DEV_MODE: ${NEXT_PUBLIC_AUTH_DEV_MODE:-false}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Inside the compose network the database host is "db", not "localhost".
      DATABASE_URL: postgresql://${POSTGRES_USER:-perfecto}:${POSTGRES_PASSWORD:-perfecto}@db:5432/${POSTGRES_DB:-perfecto}?schema=public
      # Inside the compose network Redis is the service hostname "redis".
      REDIS_URL: redis://redis:6379
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      # Omit blank AWS keys from .env when using EC2 IAM role — empty values block the role chain.
    ports:
      # Prefer nginx on 443 only in production. Keep 3000 bound to localhost if possible:
      # APP_HOST_BIND=127.0.0.1 APP_HOST_PORT=3000
      - "${APP_HOST_BIND:-0.0.0.0}:${APP_HOST_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 512M
    # Compose v2 without swarm still honors mem_limit on many hosts:
    mem_limit: 1536m
    cpus: 1.5

volumes:
  postgres-data:
  redis-data:
